name: Build iOS
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: |
          npm install
          # Force a clean native project creation
          rm -rf ios
          npx cap add ios
          # Manually assign your Apple Team ID to the project file
          sed -i '' 's/DEVELOPMENT_TEAM = "";/DEVELOPMENT_TEAM = 28962GZ9UY;/g' ios/App/App.xcodeproj/project.pbxproj
          npx cap sync ios

      - name: Build Archive
        env:
          APPSTORE_P8_KEY: ${{ secrets.APPSTORE_P8_KEY }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
        run: |
          # 1. Setup the Auth Key file
          mkdir -p ~/.private_keys
          echo "$APPSTORE_P8_KEY" > ~/.private_keys/AuthKey_$APPSTORE_KEY_ID.p8
          
          # 2. Run the archive command directly FROM the ios/App directory
          cd ios/App && xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath App.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyID $APPSTORE_KEY_ID \
            -authenticationKeyIssuerID $APPSTORE_ISSUER_ID \
            -authenticationKeyPath ~/.private_keys/AuthKey_$APPSTORE_KEY_ID.p8

      - name: Upload App Archive
        uses: actions/upload-artifact@v4
        with:
          name: NS-Stats-Archive
          path: ios/App/App.xcarchive

      - name: Upload Build Logs (If it fails)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcode-build-logs
          path: ~/Library/Developer/Xcode/DerivedData/**/Logs/Build/*.log
