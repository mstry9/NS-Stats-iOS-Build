name: Build iOS
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Prepare Project
        run: |
          npm install
          npx cap add ios
          npx cap sync ios
          sed -i '' 's/DEVELOPMENT_TEAM = "";/DEVELOPMENT_TEAM = 28962GZ9UY;/g' ios/App/App.xcodeproj/project.pbxproj

      - name: Build Archive
        env:
          APPSTORE_P8_KEY: ${{ secrets.APPSTORE_P8_KEY }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
        run: |
          mkdir -p ~/.private_keys
          echo "$APPSTORE_P8_KEY" > ~/.private_keys/AuthKey_$APPSTORE_KEY_ID.p8
          cd ios/App
          
          # 1. Create the Archive
          xcodebuild archive \
            -project App.xcodeproj -scheme App -configuration Release \
            -archivePath App.xcarchive -destination "generic/platform=iOS" \
            -allowProvisioningUpdates -authenticationKeyID $APPSTORE_KEY_ID \
            -authenticationKeyIssuerID $APPSTORE_ISSUER_ID \
            -authenticationKeyPath ~/.private_keys/AuthKey_$APPSTORE_KEY_ID.p8 \
            DEVELOPMENT_TEAM=28962GZ9UY
          
          # 2. Export the .ipa file (The one for TestFlight)
          echo '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://apple.com"><plist version="1.0"><dict><key>method</key><string>app-store</string><key>teamID</key><string>28962GZ9UY</string><key>uploadBitcode</key><false/><key>compileBitcode</key><false/><key>signingStyle</key><string>automatic</string></dict></plist>' > exportOptions.plist
          
          xcodebuild -exportArchive \
            -archivePath App.xcarchive -exportOptionsPlist exportOptions.plist -exportPath output \
            -allowProvisioningUpdates -authenticationKeyID $APPSTORE_KEY_ID \
            -authenticationKeyIssuerID $APPSTORE_ISSUER_ID \
            -authenticationKeyPath ~/.private_keys/AuthKey_$APPSTORE_KEY_ID.p8

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: NS-Stats-IPA
          path: ios/App/output/*.ipa
