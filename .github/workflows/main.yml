name: Build iOS
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: |
          npm install
          rm -rf ios
          npx cap add ios
          npx cap sync ios

      - name: Build Archive
        env:
          APPSTORE_P8_KEY: ${{ secrets.APPSTORE_P8_KEY }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
        run: |
          mkdir -p ~/.private_keys
          echo "$APPSTORE_P8_KEY" > ~/.private_keys/AuthKey_$APPSTORE_KEY_ID.p8
          
          cd ios/App
          
          # We pass EVERYTHING here: Team ID, Manual Signing, and the Profile Name
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath App.xcarchive \
            -destination "generic/platform=iOS" \
            -authenticationKeyID $APPSTORE_KEY_ID \
            -authenticationKeyIssuerID $APPSTORE_ISSUER_ID \
            -authenticationKeyPath ~/.private_keys/AuthKey_$APPSTORE_KEY_ID.p8 \
            -allowProvisioningUpdates \
            DEVELOPMENT_TEAM="28962GZ9UY" \
            CODE_SIGN_STYLE="Manual" \
            PROVISIONING_PROFILE_SPECIFIER="NS_Stats_Distribution"

      - name: Export IPA
        env:
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
        run: |
          cd ios/App
          xcodebuild -exportArchive \
            -archivePath App.xcarchive \
            -exportOptionsPlist ../../exportOptions.plist \
            -exportPath output \
            -authenticationKeyID $APPSTORE_KEY_ID \
            -authenticationKeyIssuerID $APPSTORE_ISSUER_ID \
            -authenticationKeyPath ~/.private_keys/AuthKey_$APPSTORE_KEY_ID.p8 \
            -allowProvisioningUpdates

      - name: Upload Finished App
        uses: actions/upload-artifact@v4
        with:
          name: NS-Stats-IPA
          path: ios/App/output/*.ipa
