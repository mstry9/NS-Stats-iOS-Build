name: Build iOS
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install & Sync
        run: |
          npm install
          # This command CREATES the ios/App folder automatically
          npx cap add ios
          npx cap sync ios
          
          # This line fixes the 'Development Team' error by forcing your ID into the new folder
          sed -i '' 's/DEVELOPMENT_TEAM = "";/DEVELOPMENT_TEAM = 28962GZ9UY;/g' ios/App/App.xcodeproj/project.pbxproj

      - name: Build Archive
        env:
          APPSTORE_P8_KEY: ${{ secrets.APPSTORE_P8_KEY }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
        run: |
          # 1. Create the key file the cloud builder needs
          mkdir -p ~/.private_keys
          echo "$APPSTORE_P8_KEY" > ~/.private_keys/AuthKey_$APPSTORE_KEY_ID.p8
          
          # 2. NOW we go into the folder that was just created
          cd ios/App
          
          # 3. Run the final build
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath App.xcarchive \
            -destination "generic/platform=iOS" \
            -allowProvisioningUpdates \
            -authenticationKeyID $APPSTORE_KEY_ID \
            -authenticationKeyIssuerID $APPSTORE_ISSUER_ID \
            -authenticationKeyPath ~/.private_keys/AuthKey_$APPSTORE_KEY_ID.p8

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: NS-Stats-Build
          path: ios/App/App.xcarchive
