name: Build iOS IPA
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/ios

      - name: Create Native iOS Project
        run: |
          npx cap add ios
          npx cap sync ios

      - name: Build and Sign
        env:
          APPSTORE_P8_KEY: ${{ secrets.APPSTORE_P8_KEY }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
        run: |
          # Prepare the Apple Key for signing
          mkdir -p ~/.private_keys
          echo "$APPSTORE_P8_KEY" > ~/.private_keys/AuthKey_$APPSTORE_KEY_ID.p8
          
          # Target the .xcodeproj (Fixes the "xcworkspace not found" error)
          xcodebuild archive \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -archivePath App.xcarchive \
            -destination 'generic/platform=iOS' \
            -authenticationKeyID $APPSTORE_KEY_ID \
            -authenticationKeyIssuerID $APPSTORE_ISSUER_ID \
            -authenticationKeyPath ~/.private_keys/AuthKey_$APPSTORE_KEY_ID.p8 \
            -allowProvisioningUpdates

          # Export the IPA file
          xcodebuild -exportArchive \
            -archivePath App.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath output \
            -allowProvisioningUpdates \
            -authenticationKeyID $APPSTORE_KEY_ID \
            -authenticationKeyIssuerID $APPSTORE_ISSUER_ID \
            -authenticationKeyPath ~/.private_keys/AuthKey_$APPSTORE_KEY_ID.p8

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NS-Stats-App
          path: output/*.ipa
