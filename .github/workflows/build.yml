name: Build iOS IPA
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      
      - name: Install Dependencies
        run: |
          npm install
          # We force Capacitor to create the iOS folder from scratch
          npx cap add ios || true
          npx cap sync ios

      - name: Build and Sign
        env:
          APPSTORE_P8_KEY: ${{ secrets.APPSTORE_P8_KEY }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
        run: |
          # This command builds the actual app file
          xcodebuild archive -workspace ios/App/App.xcworkspace -scheme App -archivePath App.xcarchive -destination 'generic/platform=iOS'
          xcodebuild -exportArchive -archivePath App.xcarchive -exportOptionsPlist exportOptions.plist -exportPath output -allowProvisioningUpdates

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NS-Stats-App
          path: output/*.ipa
