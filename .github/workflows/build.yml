name: Build iOS IPA
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Matching the version your CLI requires

      - name: Install Dependencies
        run: |
          npm install
          # We force install the iOS platform package specifically
          npm install @capacitor/ios

      - name: Create Native iOS Project
        run: |
          # This MUST run successfully. If it fails, the build stops here.
          npx cap add ios
          npx cap sync ios

      - name: Verify Project Exists
        run: |
          # This checks if the file actually exists before we try to build it
          if [ -d "ios/App/App.xcworkspace" ]; then
            echo "SUCCESS: iOS project folder created."
          else
            echo "ERROR: iOS project folder was NOT created. Checking logs..."
            ls -R ios || echo "ios folder does not even exist."
            exit 1
          fi

      - name: Build and Sign
        env:
          APPSTORE_P8_KEY: ${{ secrets.APPSTORE_P8_KEY }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
        run: |
          # Prepare the Apple Key
          mkdir -p ~/.private_keys
          echo "$APPSTORE_P8_KEY" > ~/.private_keys/AuthKey_$APPSTORE_KEY_ID.p8
          
          # Run the build
          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -archivePath App.xcarchive \
            -destination 'generic/platform=iOS' \
            -authenticationKeyID $APPSTORE_KEY_ID \
            -authenticationKeyIssuerID $APPSTORE_ISSUER_ID \
            -authenticationKeyPath ~/.private_keys/AuthKey_$APPSTORE_KEY_ID.p8 \
            -allowProvisioningUpdates

          # Export the IPA file
          xcodebuild -exportArchive \
            -archivePath App.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath output \
            -allowProvisioningUpdates \
            -authenticationKeyID $APPSTORE_KEY_ID \
            -authenticationKeyIssuerID $APPSTORE_ISSUER_ID \
            -authenticationKeyPath ~/.private_keys/AuthKey_$APPSTORE_KEY_ID.p8

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NS-Stats-App
          path: output/*.ipa
